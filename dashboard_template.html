<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern ERP Dashboard</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <style>
        /* ==========================================================================
           1. CSS VARIABLES & DARK MODE (Tự động thích ứng thiết bị)
           ========================================================================== */
        :root {
            /* Palette Core - Nền Sáng */
            --bg-body: #f1f5f9;
            --bg-surface: #ffffff;
            --bg-surface-hover: #f8fafc;
            
            --sidebar-bg: #1e293b;
            --sidebar-text: #cbd5e1;
            --sidebar-active-bg: rgba(59, 130, 246, 0.2);
            --sidebar-active-text: #60a5fa;
            
            --text-main: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            
            /* Brand Colors / Semantic */
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #0ea5e9;
            
            /* Shadows & Radius */
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            
            --radius-md: 8px;
            --radius-lg: 16px;
        }

        /* Hỗ trợ Dark Mode tự động dựa trên OS Theme */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #0f172a;
                --bg-surface: #1e293b;
                --bg-surface-hover: #334155;
                
                --sidebar-bg: #0b1120;
                
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --border-color: #334155;

                --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.4);
                --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
                --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.6);
            }
        }

        /* ==========================================================================
           2. RESET & BASE SETUP
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-size: 14px;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }
        
        button { cursor: pointer; border: none; outline: none; font-family: inherit; }

        /* ==========================================================================
           3. LAYOUT (SIDEBAR TRÁI + CONTENT PHẢI)
           ========================================================================== */
        .wrapper {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        #sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }
        
        .sidebar-header {
            padding: 24px;
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            letter-spacing: 0.5px;
        }
        
        .nav-menu {
            padding: 20px 12px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .nav-item {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: var(--sidebar-text);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        
        .nav-item.active {
            background-color: var(--sidebar-active-bg);
            color: var(--sidebar-active-text);
            font-weight: 600;
            box-shadow: inset 3px 0 0 var(--sidebar-active-text);
        }

        /* MAIN CONTENT */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* TOP NAV / HAMBURGER */
        .top-header {
            height: 64px;
            background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            transition: background-color 0.3s;
        }
        
        .hamburger-btn {
            display: none;
            background: transparent;
            font-size: 24px;
            color: var(--text-main);
        }

        /* DYNAMIC PAGE BODY */
        #page-view {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-main);
        }

        /* ==========================================================================
           4. BIỆN PHÁP MOBILE RESPONSIVE
           ========================================================================== */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.6);
            z-index: 900;
            backdrop-filter: blur(2px);
        }

        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                height: 100%;
                left: 0; top: 0;
                transform: translateX(-100%);
            }
            #sidebar.open {
                transform: translateX(0);
            }
            .hamburger-btn {
                display: block;
            }
            .sidebar-overlay.open {
                display: block;
            }
            #page-view {
                padding: 16px;
            }
        }

        /* ==========================================================================
           5. UI COMPONENTS: KPI CARD, TABLE, BADGES, FORM, TOAST
           ========================================================================== */
           
        /* Tái sử dụng block nền thẻ (Card) */
        .card {
            background-color: var(--bg-surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
            overflow: hidden;
            transition: background-color 0.3s;
        }
        
        .card-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-body {
            padding: 24px;
        }

        /* --- KPI CARD --- */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .kpi-card {
            background-color: var(--bg-surface);
            padding: 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        
        .kpi-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .kpi-content {
            display: flex;
            flex-direction: column;
        }
        
        .kpi-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .kpi-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-main);
            margin-top: 4px;
            line-height: 1.2;
        }

        /* --- TABLE & EXPAND PANEL --- */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        
        th, td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }
        
        th {
            background-color: var(--bg-surface);
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Freeze footer */
        tfoot th {
            border-top: 2px solid var(--border-color);
            background-color: var(--bg-surface-hover);
            color: var(--text-main);
            font-weight: 800;
            font-size: 15px;
        }
        
        /* Expand Logic */
        tbody tr.data-row {
            transition: background-color 0.2s;
            cursor: pointer;
        }
        
        tbody tr.data-row:hover {
            background-color: var(--bg-surface-hover);
        }
        
        .expand-row {
            display: none; /* hidden by default */
        }
        
        .expand-row.open {
            display: table-row;
        }
        
        .expand-panel {
            padding: 20px;
            border-radius: var(--radius-md);
            background-color: var(--bg-body);
            border: 1px dashed var(--border-color);
            margin: 10px 0;
            color: var(--text-main);
        }
        
        .expand-icon {
            transition: transform 0.3s ease;
            display: inline-block;
        }
        
        .row-open .expand-icon {
            transform: rotate(180deg);
            color: var(--primary);
        }

        /* --- BADGES --- */
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }
        
        .badge-success { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .badge-warning { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .badge-danger { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .badge-primary { background: rgba(59, 130, 246, 0.15); color: var(--primary); }

        /* --- FORMS --- */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }
        
        .form-control, .form-select {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: var(--bg-surface);
            color: var(--text-main);
            transition: all 0.2s;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        
        /* Validation */
        .form-control.is-invalid { border-color: var(--danger); }
        
        .invalid-feedback {
            display: none;
            color: var(--danger);
            font-size: 12px;
            margin-top: 6px;
            font-weight: 500;
        }
        
        .is-invalid ~ .invalid-feedback {
            display: block;
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background-color: var(--primary);
            color: #fff;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.4);
        }
        
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:hover { background-color: var(--primary-hover); }
        
        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }
        
        .btn-outline:hover { background-color: var(--bg-surface-hover); }

        /* --- TOAST NOTIFICATIONS --- */
        #toast-container {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .toast-msg {
            min-width: 300px;
            background-color: var(--bg-surface);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            padding: 16px 20px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            border-left: 5px solid var(--primary);
            /* Animation state */
            transform: translateX(120%);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
        }
        
        .toast-msg.show {
            transform: translateX(0);
            opacity: 1;
        }
        
        .toast-success { border-left-color: var(--success); }
        .toast-error { border-left-color: var(--danger); }
        
        .toast-icon { font-size: 22px; margin-top: -2px; }
        .toast-success .toast-icon { color: var(--success); }
        .toast-error .toast-icon { color: var(--danger); }
        
        .toast-content { flex: 1; }
        .toast-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; color: var(--text-main); }
        .toast-desc { font-size: 13px; color: var(--text-muted); }

        /* Utils */
        .flex { display: flex; }
        .gap-3 { gap: 16px; }
        .mt-4 { margin-top: 24px; }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Nền Overlay dành cho mobile -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    
    <!-- SIDEBAR LEFT -->
    <aside id="sidebar">
        <div class="sidebar-header">
            <i class="bi bi-hexagon-fill" style="color: var(--primary);"></i> 4F ERP
        </div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="navigateTo('dashboard', this)">
                <i class="bi bi-grid-1x2"></i> Tổng Quan
            </div>
            <div class="nav-item" onclick="navigateTo('data', this)">
                <i class="bi bi-table"></i> Quản Lý Dữ Liệu
            </div>
            <div class="nav-item" onclick="navigateTo('settings', this)">
                <i class="bi bi-gear"></i> Cài Đặt
            </div>
        </div>
    </aside>

    <!-- CONTENT RIGHT -->
    <main id="main-content">
        <header class="top-header">
            <button class="hamburger-btn" onclick="toggleSidebar()">
                <i class="bi bi-list"></i>
            </button>
            <div style="flex: 1;"></div>
            <!-- User Action Menu -->
            <div>
                <i class="bi bi-person-circle" style="font-size: 24px; color: var(--text-muted);"></i>
            </div>
        </header>

        <!-- Dynamic Content Injected Here -->
        <div id="page-view">
            <!-- Loading init... -->
        </div>
    </main>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<script>
    // ==========================================================
    // 1. MOBILE RESPONSIVE HAMBURGER
    // ==========================================================
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.querySelector('.sidebar-overlay').classList.toggle('open');
    }

    // ==========================================================
    // 2. TOAST NOTIFICATION
    // Tự động biến mất sau 3 giây
    // ==========================================================
    function triggerToast(title, message, type = 'success') {
        const container = document.getElementById('toast-container');
        const elm = document.createElement('div');
        
        let iconClass = 'bi-check-circle-fill';
        let bgClass = 'toast-success';
        
        if(type === 'error') {
            iconClass = 'bi-exclamation-triangle-fill';
            bgClass = 'toast-error';
        }
        
        elm.className = `toast-msg ${bgClass}`;
        elm.innerHTML = `
            <div class="toast-icon"><i class="bi ${iconClass}"></i></div>
            <div class="toast-content">
                <div class="toast-title">${title}</div>
                <div class="toast-desc">${message}</div>
            </div>
        `;
        
        container.appendChild(elm);
        
        // Timeout for slide in animation
        setTimeout(() => elm.classList.add('show'), 10);
        
        // Remove after 3s
        setTimeout(() => {
            elm.classList.remove('show');
            setTimeout(() => elm.remove(), 400); // Wait CSS transition
        }, 3000);
    }

    // ==========================================================
    // 3. TABLE EXPAND PANEL
    // Mở bảng chi tiết khi click hàng
    // ==========================================================
    function toggleExpandRow(element) {
        const tr = element.closest('tr'); // Lấy dòng đang click
        const nextTr = tr.nextElementSibling; // Dòng chi tiết kề dưới
        
        if (nextTr && nextTr.classList.contains('expand-row')) {
            const isOpen = nextTr.classList.contains('open');
            if (isOpen) {
                nextTr.classList.remove('open');
                tr.classList.remove('row-open');
            } else {
                nextTr.classList.add('open');
                tr.classList.add('row-open');
            }
        }
    }

    // ==========================================================
    // 4. FORM VALIDATION SAMPLE
    // ==========================================================
    function submitSampleForm(e) {
        e.preventDefault(); // Tránh load trang
        const inputKH = document.getElementById('txtKhachHang');
        
        if (inputKH.value.trim() === '') {
            inputKH.classList.add('is-invalid');
            triggerToast('Lỗi nhập liệu', 'Tên khách hàng không được để trống.', 'error');
            return;
        }
        
        // Pass Validation
        inputKH.classList.remove('is-invalid');
        triggerToast('Lưu Thành Công', 'Đã lưu thông tin đơn hàng thiết lập mới.');
        document.getElementById('demoForm').reset();
    }


    // ==========================================================
    // 5. SPA ROUTING: MỖI TRANG = 1 HÀM JS CONTENT
    // ==========================================================
    
    // Trang 1: Tổng Quan (Dashboard View)

    // Trang 2: Quản Lý Dữ Liệu (Table + Form View)
    function viewData() {
        const html = `
            <h1 class="page-title">Quản Lý Dữ Liệu</h1>

                            </thead>
                            <tbody>

                                            <div style="color: var(--text-muted); font-size:13px;">Giao hàng: Xe tải phụ trách (Biển số 29C-12345). Tiến độ đúng hạn.</div>
                                        </div>
                                    </td>
                                </tr>

                                <!-- DÒNG 2 -->
                                <tr class="data-row" onclick="toggleExpandRow(this)">
                                    <td><i class="bi bi-chevron-down expand-icon"></i></td>
                                    <td><strong>ORD-2402</strong></td>
                                    <td>Tập Đoàn VinGroup</td>
                                    <td>210,000,000 ₫</td>
                                    <td><span class="badge badge-warning">Đang Sản Xuất</span></td>
                                </tr>
                                <tr class="expand-row">
                                    <td colspan="5" style="padding: 0 24px;">
                                        <div class="expand-panel">
                                            Mã Vận đơn: VD-9992. Tiến độ CNC hoàn thành 80%. Đang chờ linh kiện phụ trợ từ xưởng 2.
                                        </div>
                                    </td>
                                </tr>

                                <!-- DÒNG 3 -->
                                <tr class="data-row" onclick="toggleExpandRow(this)">

    // Trang 3: Setting
    function viewSettings() {
        document.getElementById('page-view').innerHTML = `
            <h1 class="page-title">Cài Đặt Hệ Thống</h1>
            <div class="card">
                <div class="card-body">Cài đặt phân quyền, hệ số định mức...</div>
            </div>
        `;
    }

    // Bộ định tuyến chính
    function navigateTo(page, navEl) {
        // Cập nhật trạng thái Active trên sidebar
        if(navEl) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            navEl.classList.add('active');
        }

        // Ẩn sidebar nếu đang ở Mobile Menu
        if(window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.remove('open');
            document.querySelector('.sidebar-overlay').classList.remove('open');
        }

        // Tải nội dung
        if(page === 'dashboard') viewDashboard();
        if(page === 'data') viewData();
        if(page === 'settings') viewSettings();
    }

    // Khi khởi động file
    document.addEventListener('DOMContentLoaded', () => {
        viewDashboard(); // Trỏ vào trang mặc định
    });
</script>
